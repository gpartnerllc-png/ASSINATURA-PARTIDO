- name: Publicar na Cloudflare
  env:
    CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
    CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
  run: |
    # Força a remoção de caches antigos do wrangler antes de subir
    rm -rf .wrangler

    # Deploy forçado usando o ID da conta explicitamente
    npx wrangler deploy --name assinatura-partido-mjp --account-id $CLOUDFLARE_ACCOUNT_ID
