name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # ajuste para o script real do seu package.json (por ex. "build")

      - name: Publicar na Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          # Remove pastas de cache para garantir que nada antigo interfira
          rm -rf .wrangler

          # Executa o deploy garantindo que o Wrangler utilize o token e o ID de conta
          npx wrangler deploy --name assinatura-partido-mjp --account-id $CLOUDFLARE_ACCOUNT_ID
