<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJP - Brasil Evoluído</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #009b3a 0%, #fedf00 50%, #002776 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
        }
        .container { 
            background: rgba(0, 0, 0, 0.7); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 90%; 
            max-width: 450px; 
            text-align: center; 
            backdrop-filter: blur(10px); 
        }
        h1 { 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: #fedf00;
        }
        p {
            margin-bottom: 30px;
            font-size: 16px;
        }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: none; 
            border-radius: 8px; 
            box-sizing: border-box;
            font-size: 14px;
            color: #333;
        }
        input::placeholder {
            color: #999;
        }
        input:focus {
            outline: 2px solid #009b3a;
            background: #f9f9f9;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #009b3a; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover:not(:disabled) { 
            background: #007a2e; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,155,58,0.4);
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.8;
        }
        .mensagem {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .mensagem.sucesso {
            background: rgba(0, 155, 58, 0.2);
            border: 1px solid #009b3a;
            color: #90EE90;
            display: block;
        }
        .mensagem.erro {
            background: rgba(255, 100, 100, 0.2);
            border: 1px solid #ff6464;
            color: #ff9999;
            display: block;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
        }
        .loading.ativo {
            display: block;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partido MJP</h1>
        <p>Assine pelo Brasil Evoluído</p>
        <form id="assinaturaForm">
            <input type="text" id="nome" placeholder="Nome Completo" required>
            <input type="email" id="email" placeholder="E-mail" required>
            <button type="submit">VALIDAR ASSINATURA</button>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin: 10px 0 0 0; font-size: 13px;">Processando...</p>
            </div>
            <div class="mensagem" id="mensagem"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('assinaturaForm');
        const botao = form.querySelector('button');
        const loadingDiv = document.getElementById('loading');
        const mensagemDiv = document.getElementById('mensagem');

        // Validação de e-mail mais robusta
        function validarEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        // Limpar mensagens
        function limparMensagem() {
            mensagemDiv.classList.remove('sucesso', 'erro');
            mensagemDiv.textContent = '';
            mensagemDiv.style.display = 'none';
        }

        // Exibir mensagem
        function exibirMensagem(texto, tipo) {
            mensagemDiv.textContent = texto;
            mensagemDiv.classList.add(tipo);
            mensagemDiv.style.display = 'block';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            limparMensagem();
            
            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();

            // Validação do nome
            if (nome.length < 3) {
                exibirMensagem('❌ Nome deve ter no mínimo 3 caracteres', 'erro');
                return;
            }

            if (nome.length > 100) {
                exibirMensagem('❌ Nome muito longo (máximo 100 caracteres)', 'erro');
                return;
            }

            // Validação do e-mail
            if (!validarEmail(email)) {
                exibirMensagem('❌ E-mail inválido. Verifique e tente novamente', 'erro');
                return;
            }

            // Desabilitar botão e mostrar loading
            botao.disabled = true;
            botao.textContent = 'VALIDANDO...';
            loadingDiv.classList.add('ativo');

            try {
                const resposta = await fetch('/api/assinar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nome,
                        email,
                        timestamp: new Date().toISOString()
                    }),
                    timeout: 10000 // timeout de 10 segundos
                });

                if (resposta.ok) {
                    exibirMensagem('✅ Assinatura registrada com sucesso! Obrigado pelo apoio ao MJP', 'sucesso');
                    form.reset();
                } else {
                    const erro = await resposta.text().catch(() => 'Erro desconhecido');
                    exibirMensagem(`❌ Erro ao registrar: ${resposta.status}. Tente novamente em alguns momentos`, 'erro');
                    console.error('Erro:', erro);
                }
            } catch (erro) {
                if (erro.name === 'AbortError') {
                    exibirMensagem('❌ Requisição expirou. Verifique sua internet e tente novamente', 'erro');
                } else {
                    exibirMensagem('❌ Erro de conexão. Verifique sua internet e tente novamente', 'erro');
                }
                console.error('Erro de conexão:', erro);
            } finally {
                // Reabilitar botão
                botao.disabled = false;
                botao.textContent = 'VALIDAR ASSINATURA';
                loadingDiv.classList.remove('ativo');
            }
        });

        // Limpeza automática de mensagens ao editar
        document.getElementById('nome').addEventListener('focus', limparMensagem);
        document.getElementById('email').addEventListener('focus', limparMensagem);
    </script>
</body>
</html>
