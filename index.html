<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJP - Brasil Evoluído</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #009b3a 0%, #fedf00 50%, #002776 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .container { background: rgba(0, 0, 0, 0.7); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 450px; text-align: center; backdrop-filter: blur(10px); }
        h1 { margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #009b3a; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #007a2e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partido MJP</h1>
        <p>Assine pelo Brasil Evoluído</p>
        <form id="assinaturaForm">
            <input type="text" id="nome" placeholder="Nome Completo" required>
            <input type="email" id="email" placeholder="E-mail" required>
            <button type="submit">VALIDAR ASSINATURA</button>
        </form>
    </div>
    <script>
        document.getElementById('assinaturaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                timestamp: new Date().toISOString()
            };
            // O Worker processa este envio para o Telegram com segurança
            const resposta = await fetch('/api/assinar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });
            if(resposta.ok) alert('Assinatura registrada com sucesso!');
        });
    </script>
</body>
</html>
